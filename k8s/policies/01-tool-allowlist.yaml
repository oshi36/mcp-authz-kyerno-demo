# ──────────────────────────────────────────────────────────────────────────────
# Policy 1: Tool Allowlist per Agent Identity
# API: policies.kyverno.io/v1 / ValidatingPolicy
#
# Real tool names from containers/kubernetes-mcp-server (19 tools):
#   configuration_view, events_list, namespaces_list, nodes_log,
#   nodes_stats_summary, nodes_top, pods_delete, pods_exec, pods_get,
#   pods_list, pods_list_in_namespace, pods_log, pods_run, pods_top,
#   resources_create_or_update, resources_delete, resources_get,
#   resources_list, resources_scale
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: mcp-tool-allowlist
  annotations:
    policies.kyverno.io/title: MCP Tool Allowlist per Agent Identity
    policies.kyverno.io/category: MCP Authorization
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Enforces per-agent tool allowlists for MCP tool invocations.
      Each agent is restricted to a defined set of tools via spec.agentId.
      Any invocation outside the allowlist is denied at admission.
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups:   ["mcp.security.io"]
        apiVersions: ["v1alpha1"]
        operations:  ["CREATE"]
        resources:   ["mcptoolinvocations"]
  validations:

    # ── Require agentId ───────────────────────────────────────────────────────
    - expression: >-
        has(object.spec.agentId) && object.spec.agentId != ""
      message: >-
        MCPToolInvocation must include a non-empty agentId in spec.

    # ── SRE Agent — read-only observability tools ─────────────────────────────
    # Low risk: can list, get, and read logs. No writes, no exec, no deletes.
    - expression: >-
        !(object.spec.agentId == "sre-agent") ||
        object.spec.toolName in [
          "pods_list",
          "pods_list_in_namespace",
          "pods_get",
          "pods_log",
          "pods_top",
          "events_list",
          "namespaces_list",
          "nodes_top",
          "configuration_view"
        ]
      messageExpression: >-
        "sre-agent is not permitted to invoke '" + object.spec.toolName + "'. " +
        "Allowed tools: pods_list, pods_list_in_namespace, pods_get, pods_log, " +
        "pods_top, events_list, namespaces_list, nodes_top, configuration_view"

    # ── Cost Agent — resource usage and billing reads ─────────────────────────
    # Low risk: reads only resource metrics and billing data.
    - expression: >-
        !(object.spec.agentId == "cost-agent") ||
        object.spec.toolName in [
          "nodes_stats_summary",
          "nodes_top",
          "nodes_log",
          "pods_top",
          "resources_list",
          "resources_get"
        ]
      messageExpression: >-
        "cost-agent is not permitted to invoke '" + object.spec.toolName + "'. " +
        "Allowed tools: nodes_stats_summary, nodes_top, nodes_log, " +
        "pods_top, resources_list, resources_get"

    # ── Remediation Agent — write tools (require human trigger via Policy 3b) ─
    # High risk: can delete, exec, scale, and create resources.
    # Policy 3b enforces that all these require a human triggeredBy field.
    - expression: >-
        !(object.spec.agentId == "remediation-agent") ||
        object.spec.toolName in [
          "pods_delete",
          "pods_exec",
          "pods_run",
          "resources_scale",
          "resources_create_or_update",
          "resources_delete"
        ]
      messageExpression: >-
        "remediation-agent is not permitted to invoke '" + object.spec.toolName + "'. " +
        "Allowed tools: pods_delete, pods_exec, pods_run, " +
        "resources_scale, resources_create_or_update, resources_delete"

    # ── Unknown agent — deny by default ──────────────────────────────────────
    - expression: >-
        object.spec.agentId in ["sre-agent", "cost-agent", "remediation-agent"]
      messageExpression: >-
        "Unknown agent '" + object.spec.agentId + "' is not registered. " +
        "Permitted agents: sre-agent, cost-agent, remediation-agent"